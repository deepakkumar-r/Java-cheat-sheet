  num:1, title:"Java Fundamentals", tags:["jvm"],

  entries:[
    {
      title:"Platform Independence / WORA",
      def:"Java compiles to bytecode; JVM interprets it on any OS. Write Once Run Anywhere.",
      when:"Understanding why Selenium WebDriver jars work on Windows/Mac/Linux without recompiling.",
      code:`<span class="cm">// Bytecode lives in .class files → JVM runs on any OS</span>
<span class="kw">public class</span> <span class="ty">Hello</span> {
  <span class="kw">public static void</span> <span class="fn">main</span>(<span class="ty">String</span>[] args) {
    <span class="ty">System</span>.out.<span class="fn">println</span>(<span class="str">"Runs anywhere"</span>);
  }
}`
    },
    {
      title:"Primitive Types & Autoboxing",
      def:"8 primitives: byte(1) short(2) int(4) long(8) float(4) double(8) char(2) boolean(1). Autoboxing = auto int↔Integer conversion.",
      when:"Avoid NullPointerException when unboxing Integer from Map returned by API response.",
      code:`<span class="ty">int</span> x = <span class="num">5</span>;
<span class="ty">Integer</span> boxed = x;           <span class="cm">// autobox</span>
<span class="ty">Map</span>&lt;<span class="ty">String</span>, <span class="ty">Integer</span>&gt; m = <span class="kw">new</span> <span class="ty">HashMap</span>&lt;&gt;();
<span class="ty">int</span> val = m.<span class="fn">getOrDefault</span>(<span class="str">"key"</span>, <span class="num">0</span>); <span class="cm">// safe unbox</span>`
    },
    {
      title:"JIT Compiler vs Interpreted",
      def:"JIT compiles hot bytecode to native machine code at runtime for speed. Interpreted = line-by-line, slower.",
      when:"Large test suite slow? JIT warms up — first run slower, subsequent runs faster (matters in CI pipelines).",
      code:`<span class="cm">// JVM flags to tune JIT in test runs:</span>
<span class="cm">// -server  → aggressive JIT optimisations</span>
<span class="cm">// -XX:+TieredCompilation → default since Java 8</span>`
    }
  ]
},
{
  num:2, title:"JDK / JRE / JVM + Memory", tags:["jvm"],
  chips:[{t:"JVM",c:"c-jvm"}],
  entries:[
    {
      title:"JDK vs JRE vs JVM",
      def:"JDK = JRE + compiler + tools. JRE = JVM + libraries. JVM = runtime engine that runs .class files.",
      when:"CI server needs JDK to compile tests; prod server only needs JRE to run them.",
      code:`<span class="cm">// JVM memory areas:</span>
<span class="cm">// Heap: Objects (Eden, Survivor, Old Gen)</span>
<span class="cm">// Stack: method frames, local vars (per thread)</span>
<span class="cm">// Metaspace: class metadata (Java 8+, no PermGen)</span>
<span class="cm">// PC Register: current instruction per thread</span>`
    },
    {
      title:"Heap vs Stack + GC",
      def:"Stack = fast, thread-local, auto-freed. Heap = shared, GC-managed. GC types: Serial, Parallel, G1 (default Java 9+), ZGC.",
      when:"OutOfMemoryError in long test runs? Tune -Xmx. Use G1GC for low pause in parallel test execution.",
      code:`<span class="cm">// Tune JVM for large parallel test suites:</span>
<span class="cm">// -Xms512m -Xmx2g -XX:+UseG1GC</span>
<span class="ty">System</span>.<span class="fn">gc</span>(); <span class="cm">// suggest GC (not guaranteed)</span>
<span class="cm">// WeakReference — GC can collect anytime:</span>
<span class="ty">WeakReference</span>&lt;<span class="ty">WebDriver</span>&gt; wr = <span class="kw">new</span> <span class="ty">WeakReference</span>&lt;&gt;(driver);`
    },
    {
      title:"ClassLoader + Memory Leaks",
      def:"ClassLoader loads .class files: Bootstrap → Extension → App. Memory leaks: unclosed streams, static collections growing, ThreadLocal not removed.",
      when:"Static WebDriver Map in base class accumulates instances across threads → leak. Use ThreadLocal + @AfterMethod cleanup.",
      code:`<span class="kw">static</span> <span class="ty">ThreadLocal</span>&lt;<span class="ty">WebDriver</span>&gt; driver = <span class="kw">new</span> <span class="ty">ThreadLocal</span>&lt;&gt;();
<span class="cm">// @AfterMethod</span>
driver.<span class="fn">get</span>().<span class="fn">quit</span>();
driver.<span class="fn">remove</span>(); <span class="cm">// prevent leak!</span>`
    }
  ]
},
{
  num:3, title:"JMM — volatile, synchronized, happens-before", tags:["jvm","framework"],
  chips:[{t:"JVM",c:"c-jvm"},{t:"FW",c:"c-fw"}],
  entries:[
    {
      title:"volatile vs synchronized",

      code:`<span class="kw">volatile boolean</span> stop = <span class="kw">false</span>; <span class="cm">// visible to all threads</span>

<span class="kw">synchronized void</span> <span class="fn">increment</span>() { count++; } <span class="cm">// atomic</span>

<span class="cm">// Or use AtomicInteger in parallel test framework:</span>
<span class="ty">AtomicInteger</span> pass = <span class="kw">new</span> <span class="ty">AtomicInteger</span>(<span class="num">0</span>);
pass.<span class="fn">incrementAndGet</span>();`
    }
  ]
},
{

    {

  <span class="kw">public void</span> <span class="fn">enterEmail</span>(<span class="ty">String</span> e) {

  }
}`
    },
    {
      title:"Inheritance",

      code:`<span class="kw">public class</span> <span class="ty">BasePage</span> {
  <span class="kw">protected</span> <span class="ty">WebDriver</span> driver;
  <span class="kw">public</span> <span class="ty">BasePage</span>(<span class="ty">WebDriver</span> d) { driver = d; }
}
<span class="kw">public class</span> <span class="ty">LoginPage</span> <span class="kw">extends</span> <span class="ty">BasePage</span> {
  <span class="kw">public</span> <span class="ty">LoginPage</span>(<span class="ty">WebDriver</span> d) { <span class="kw">super</span>(d); }

    },
    {

      code:`<span class="cm">// Overloading (compile-time):</span>
<span class="ty">WebElement</span> <span class="fn">find</span>(<span class="ty">By</span> by) { ... }
<span class="ty">WebElement</span> <span class="fn">find</span>(<span class="ty">By</span> by, <span class="kw">int</span> timeout) { ... }
<span class="cm">// Overriding (runtime):</span>

<span class="kw">public void</span> <span class="fn">setUp</span>() { <span class="kw">super</span>.<span class="fn">setUp</span>(); <span class="fn">loginAsAdmin</span>(); }

let activeFilter = 'all';
let searchTerm = '';

function setFilter(f, btn) {
  activeFilter = f;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterAll();
}

function filterAll() {
  searchTerm = document.getElementById('search').value.toLowerCase();
  renderSections();
}

function sectionMatchesFilter(sec) {
  if (activeFilter === 'all') return true;
  const map = { selenium: 'selenium', api: 'api', testng: 'testng', framework: 'framework', jvm: 'jvm' };
  return sec.tags.includes(map[activeFilter]);
}

function entryMatchesSearch(entry) {
  if (!searchTerm) return true;
  const s = searchTerm;
  return (
    entry.title.toLowerCase().includes(s) ||
    entry.def.toLowerCase().includes(s) ||
    entry.when.toLowerCase().includes(s) ||
    (entry.code && entry.code.replace(/<[^>]+>/g,'').toLowerCase().includes(s))
  );
}

function renderSections() {
  const container = document.getElementById('sections');
  container.innerHTML = '';
  let anyVisible = false;

  DATA.forEach((sec, si) => {
    if (!sectionMatchesFilter(sec)) return;
    
    const matchingEntries = sec.entries.filter(entryMatchesSearch);
    if (searchTerm && matchingEntries.length === 0) return;
    
    anyVisible = true;
    const entries = searchTerm ? matchingEntries : sec.entries;
    
    const div = document.createElement('div');
    div.className = 'section open';
    div.innerHTML = `
      <div class="sec-header" onclick="toggleSection(this)">
        <div class="sec-left">
          <div class="sec-num">${sec.num}</div>
          <span class="sec-title">${sec.title}</span>
          <div class="sec-chips">${sec.chips.map(c => `<span class="chip ${c.c}">${c.t}</span>`).join('')}</div>
        </div>
        <span class="sec-arrow">▶</span>
      </div>
      <div class="sec-body">
        ${entries.map(e => `
          <div class="entry">
            <div class="entry-head">
              <span class="entry-title">${e.title}</span>
            </div>
            <div class="row">
              <div class="def"><strong>Def</strong><span>${e.def}</span></div>
              <div class="when-use"><strong>When (QA/Automation)</strong><span>${e.when}</span></div>
            </div>
            <pre>${e.code}</pre>
          </div>
        `).join('')}
      </div>
    `;
    container.appendChild(div);
  });

  const noRes = document.getElementById('no-results');
  noRes.classList.toggle('hidden', anyVisible);
}

function toggleSection(header) {
  header.parentElement.classList.toggle('open');
}

renderSections();
</script>
